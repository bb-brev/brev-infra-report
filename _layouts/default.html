<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} — Brev Infra Report</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-2: #1a1a25;
      --surface-3: #222230;
      --border: #2a2a3a;
      --border-light: #3a3a4a;
      --text: #e4e4ed;
      --text-muted: #8888a0;
      --text-dim: #6a6a80;
      --accent: #7c6aff;
      --accent-light: #9d8fff;
      --accent-dim: rgba(124, 106, 255, 0.12);
      --green: #34d399;
      --green-dim: rgba(52, 211, 153, 0.12);
      --yellow: #fbbf24;
      --yellow-dim: rgba(251, 191, 36, 0.12);
      --red: #f87171;
      --red-dim: rgba(248, 113, 113, 0.12);
      --blue: #60a5fa;
      --blue-dim: rgba(96, 165, 250, 0.12);
      --font: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --mono: 'JetBrains Mono', 'Fira Code', 'SF Mono', monospace;
      --radius: 12px;
      --radius-sm: 8px;
    }

    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      font-size: 15px;
      -webkit-font-smoothing: antialiased;
    }

    /* Nav */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(10, 10, 15, 0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
    }
    nav .nav-inner {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }
    nav .logo {
      font-weight: 800;
      font-size: 16px;
      color: var(--text);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    nav .logo span {
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    nav .back-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.2s;
    }
    nav .back-link:hover {
      color: var(--text);
      background: var(--surface-2);
    }

    /* Main content */
    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 120px;
    }

    /* Typography */
    h1 {
      font-size: 36px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 12px;
    }
    h1 .gradient {
      background: linear-gradient(135deg, var(--accent), #a78bfa, var(--blue));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    h2 {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-top: 56px;
      margin-bottom: 16px;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--border);
    }
    h3 {
      font-size: 17px;
      font-weight: 600;
      margin-top: 32px;
      margin-bottom: 10px;
      color: var(--text);
    }
    h4 {
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-top: 24px;
      margin-bottom: 8px;
    }

    p { margin-bottom: 16px; color: var(--text); }
    strong { font-weight: 600; color: var(--text); }
    a { color: var(--accent-light); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* Verdict badge */
    .verdict {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 24px;
    }
    .verdict.recommend { background: var(--green-dim); color: var(--green); border: 1px solid rgba(52,211,153,0.2); }
    .verdict.evaluate { background: var(--yellow-dim); color: var(--yellow); border: 1px solid rgba(251,191,36,0.2); }
    .verdict.skip { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,113,113,0.2); }
    .verdict.continue { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(96,165,250,0.2); }

    /* Meta bar */
    .meta-bar {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      margin-bottom: 32px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .meta-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .meta-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
    }
    .meta-value {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: var(--border-light); }
    .card h3 { margin-top: 0; }
    .card p:last-child { margin-bottom: 0; }

    /* Pros/Cons */
    .pros-cons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 24px 0;
    }
    @media (max-width: 640px) {
      .pros-cons { grid-template-columns: 1fr; }
    }
    .pros-card, .cons-card {
      border-radius: var(--radius);
      padding: 20px;
      border: 1px solid;
    }
    .pros-card {
      background: var(--green-dim);
      border-color: rgba(52, 211, 153, 0.15);
    }
    .cons-card {
      background: var(--red-dim);
      border-color: rgba(248, 113, 113, 0.15);
    }
    .pros-card h4, .cons-card h4 {
      margin-top: 0;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .pros-card h4 { color: var(--green); }
    .cons-card h4 { color: var(--red); }
    .pros-card ul, .cons-card ul {
      list-style: none;
      padding: 0;
    }
    .pros-card li, .cons-card li {
      position: relative;
      padding-left: 20px;
      margin-bottom: 8px;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
    }
    .pros-card li::before {
      content: "✓";
      position: absolute;
      left: 0;
      color: var(--green);
      font-weight: 700;
    }
    .cons-card li::before {
      content: "✗";
      position: absolute;
      left: 0;
      color: var(--red);
      font-weight: 700;
    }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
      margin: 20px 0;
      font-size: 14px;
    }
    th {
      text-align: left;
      padding: 10px 14px;
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }

    /* Code */
    code {
      font-family: var(--mono);
      font-size: 13px;
      background: var(--surface-2);
      padding: 2px 6px;
      border-radius: 4px;
      color: var(--accent-light);
    }
    pre {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 16px 20px;
      overflow-x: auto;
      margin: 16px 0;
    }
    pre code {
      background: none;
      padding: 0;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }

    /* Lists */
    ul, ol {
      padding-left: 20px;
      margin-bottom: 16px;
    }
    li {
      margin-bottom: 6px;
      color: var(--text);
    }

    /* Blockquote — used for callouts */
    blockquote {
      border-left: 3px solid var(--accent);
      background: var(--accent-dim);
      padding: 14px 20px;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 20px 0;
      font-size: 14px;
    }
    blockquote p { margin-bottom: 0; color: var(--text); }

    /* Migration steps */
    .step {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .step:last-child { border-bottom: none; }
    .step-num {
      flex-shrink: 0;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-dim);
      color: var(--accent-light);
      font-weight: 700;
      font-size: 14px;
      border-radius: 8px;
      border: 1px solid rgba(124,106,255,0.2);
    }
    .step-content h4 { margin-top: 0; color: var(--text); text-transform: none; letter-spacing: normal; font-size: 15px; }
    .step-content p { font-size: 14px; color: var(--text-muted); margin-bottom: 0; }

    /* Grid cards for homepage */
    .tool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }
    @media (max-width: 640px) {
      .tool-grid { grid-template-columns: 1fr; }
    }
    .tool-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-decoration: none;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .tool-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      text-decoration: none;
      box-shadow: 0 8px 24px rgba(124,106,255,0.08);
    }
    .tool-card .tool-name {
      font-weight: 700;
      font-size: 15px;
      color: var(--text);
    }
    .tool-card .tool-desc {
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.5;
    }
    .tool-card .tool-badge {
      display: inline-flex;
      align-self: flex-start;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
    }
    .tool-badge.rec { background: var(--green-dim); color: var(--green); }
    .tool-badge.eval { background: var(--yellow-dim); color: var(--yellow); }
    .tool-badge.skip { background: var(--red-dim); color: var(--red); }
    .tool-badge.cont { background: var(--blue-dim); color: var(--blue); }

    /* Section labels */
    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      margin-top: 40px;
      margin-bottom: 12px;
    }

    /* Separator */
    hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 40px 0;
    }

    /* Subtitle */
    .subtitle {
      font-size: 17px;
      color: var(--text-muted);
      line-height: 1.6;
      margin-bottom: 40px;
    }

    /* Footer */
    footer {
      text-align: center;
      padding: 40px 24px;
      color: var(--text-dim);
      font-size: 13px;
      border-top: 1px solid var(--border);
      max-width: 860px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="{{ site.baseurl }}/" class="logo">⚡ <span>Brev</span> Infra Report</a>
      {% if page.url != "/" and page.url != "/index.html" %}
      <a href="{{ site.baseurl }}/" class="back-link">← All Categories</a>
      {% endif %}
    </div>
  </nav>

  <div class="container">
    {{ content }}
  </div>

  <footer>
    Generated March 2026 · Based on Brev's production architecture · SST v3 + AWS + Aurora PostgreSQL
  </footer>
</body>
</html>
